services:
  db:
    image: postgres:16
    container_name: menu-tree-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: menu_tree
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: menu-tree-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: menu-tree-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
